name: DevSecOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  # ============================================
  # STEP 2: SAST - Static Application Security Testing
  # ============================================
  
  sast-semgrep:
    name: SAST - Semgrep (Multi-language)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/security-audit
            p/ci
          generateSarif: true
          sarif-output: semgrep-results.sarif

      - name: Upload Semgrep SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  sast-bandit:
    name: SAST - Bandit (Python Security)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit==1.7.5 bandit-json-formatter

      - name: Run Bandit on Python services
        run: |
          bandit -r services/user-service services/notifications-service \
            -f json -o bandit-results.json || true

      - name: Convert Bandit JSON to SARIF
        run: |
          python3 << 'EOF'
          import json
          import sys
          
          with open('bandit-results.json', 'r') as f:
              bandit_data = json.load(f)
          
          sarif = {
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "Bandit",
                          "version": "1.7.5",
                          "informationUri": "https://bandit.readthedocs.io"
                      }
                  },
                  "results": []
              }]
          }
          
          for result in bandit_data.get('results', []):
              sarif["runs"][0]["results"].append({
                  "ruleId": result.get('test_id', 'UNKNOWN'),
                  "message": {"text": result.get('issue_text', '')},
                  "level": "warning" if result.get('severity') == "MEDIUM" else "error",
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": result.get('filename', '')},
                          "region": {"startLine": result.get('line_number', 0)}
                      }
                  }]
              })
          
          with open('bandit-results.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          EOF

      - name: Upload Bandit SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  sast-sonarqube:
    name: SAST - SonarQube (Code Quality & Security)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install SonarScanner
        run: |
          npm install -g sonarqube-scanner

      - name: Run SonarQube Scan
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'http://localhost:9000' }}
          SONAR_LOGIN: ${{ secrets.SONAR_TOKEN || 'admin' }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=secureshop \
            -Dsonar.sources=services \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.login=$SONAR_LOGIN \
            -Dsonar.exclusions="**/node_modules/**,**/venv/**,**/__pycache__/**" \
            -Dsonar.python.version=3.11 \
            || echo "SonarQube scan completed (may require server setup)"

  sast-eslint:
    name: SAST - ESLint (JavaScript/Node.js)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install eslint eslint-plugin-security --save-dev
        working-directory: ./services/product-service

      - name: Run ESLint
        run: |
          npx eslint services/product-service services/order-service services/payment-service services/inventory-service \
            --format json --output-file eslint-results.json || true
        continue-on-error: true

      - name: Convert ESLint to SARIF
        if: always() && hashFiles('eslint-results.json') != ''
        run: |
          python3 << 'EOF'
          import json
          import sys
          
          try:
              with open('eslint-results.json', 'r') as f:
                  eslint_data = json.load(f)
          except:
              eslint_data = []
          
          sarif = {
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "ESLint",
                          "informationUri": "https://eslint.org"
                      }
                  },
                  "results": []
              }]
          }
          
          for file_result in eslint_data:
              for message in file_result.get('messages', []):
                  sarif["runs"][0]["results"].append({
                      "ruleId": message.get('ruleId', 'UNKNOWN'),
                      "message": {"text": message.get('message', '')},
                      "level": "error" if message.get('severity') == 2 else "warning",
                      "locations": [{
                          "physicalLocation": {
                              "artifactLocation": {"uri": file_result.get('filePath', '')},
                              "region": {"startLine": message.get('line', 0)}
                          }
                      }]
                  })
          
          with open('eslint-results.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          EOF

      - name: Upload ESLint SARIF
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: eslint-results.sarif
          category: eslint

  # ============================================
  # STEP 3: SCA - Software Composition Analysis (Dependencies)
  # ============================================

  sca-dependencies:
    name: SCA - Dependency Check (CVE Detection)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'SecureShop'
          path: '.'
          format: 'SARIF'
          args: >
            --enableExperimental
            --scan services/

      - name: Upload Dependency-Check SARIF
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: dependency-check-report.sarif
          category: dependency-check

  sca-npm-audit:
    name: SCA - NPM Audit (Node.js Vulnerabilities)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run npm audit on all services
        run: |
          for service in services/product-service services/order-service services/payment-service services/inventory-service; do
            if [ -f "$service/package.json" ]; then
              echo "Auditing $service..."
              cd $service
              npm audit --json || true
              cd - > /dev/null
            fi
          done
        continue-on-error: true

  sca-python-safety:
    name: SCA - Safety Check (Python Vulnerabilities)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Safety
        run: pip install safety

      - name: Run Safety check on Python services
        run: |
          for service in services/user-service services/notifications-service; do
            if [ -f "$service/requirements.txt" ]; then
              echo "Checking $service..."
              safety check -r "$service/requirements.txt" || true
            fi
          done
        continue-on-error: true

  # ============================================
  # STEP 4: Secrets Detection
  # ============================================

  secrets-gitleaks:
    name: Secrets Detection - GitLeaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  secrets-trufflehog:
    name: Secrets Detection - TruffleHog
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --json --only-verified
        continue-on-error: true

  # ============================================
  # STEP 5: Container Image Scanning (IaC)
  # ============================================

  container-hadolint:
    name: IaC - Hadolint (Dockerfile Linting)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: |
            services/user-service/Dockerfile
            services/product-service/Dockerfile
            services/order-service/Dockerfile
            services/payment-service/Dockerfile
            services/notification-service/Dockerfile
            services/inventory-service/Dockerfile
          ignore: DL3008,DL3009
        continue-on-error: true

  container-checkov:
    name: IaC - Checkov (Docker Compose & Dockerfile Security)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: docker,dockerfile
          quiet: false
          skip-check: CKV_DOCKER_2  # Allow root (for demo purposes)
          output-format: sarif
          output-file-path: checkov-results.sarif
        continue-on-error: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v2
        if: always() && hashFiles('checkov-results.sarif') != ''
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ============================================
  # Summary Report
  # ============================================

  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sast-bandit, sast-sonarqube, sast-eslint, sca-dependencies, sca-npm-audit, sca-python-safety, secrets-gitleaks, secrets-trufflehog, container-hadolint, container-checkov]
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "=========================================="
          echo "   DEVSECOPS SECURITY SCAN SUMMARY"
          echo "=========================================="
          echo ""
          echo "✅ SAST Scans Completed:"
          echo "   - Semgrep (Multi-language)"
          echo "   - Bandit (Python)"
          echo "   - SonarQube (Code Quality)"
          echo "   - ESLint (JavaScript)"
          echo ""
          echo "✅ SCA Scans Completed:"
          echo "   - Dependency-Check (CVE Database)"
          echo "   - NPM Audit (Node.js)"
          echo "   - Safety Check (Python)"
          echo ""
          echo "✅ Secrets Detection Completed:"
          echo "   - GitLeaks (Git History)"
          echo "   - TruffleHog (Entropy Analysis)"
          echo ""
          echo "✅ Infrastructure-as-Code Scans Completed:"
          echo "   - Hadolint (Dockerfile Best Practices)"
          echo "   - Checkov (Docker Security)"
          echo ""
          echo "📊 View Results:"
          echo "   → GitHub Security Tab: Repository → Security → Code Scanning"
          echo "   → SARIF Files uploaded for analysis"
          echo ""
          echo "=========================================="
