version: '3.8'

services:
  # API Gateway (Nginx)
  api-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
      - notification-service
      - inventory-service
    networks:
      - secureshop-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # User Service (Python)
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production}
      - DB_HOST=user-db
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
    depends_on:
      - user-db
    networks:
      - secureshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  user-db:
    image: postgres:15-alpine
    container_name: user-db
    environment:
      - POSTGRES_DB=user_db
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - secureshop-network
    restart: unless-stopped

  # Product Service (Node.js)
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - NODE_ENV=production
      - DB_HOST=product-db
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
    depends_on:
      - product-db
    networks:
      - secureshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  product-db:
    image: postgres:15-alpine
    container_name: product-db
    environment:
      - POSTGRES_DB=product_db
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - product-db-data:/var/lib/postgresql/data
    networks:
      - secureshop-network
    restart: unless-stopped

  # Order Service (Node.js)
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - NODE_ENV=production
      - DB_HOST=order-db
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    depends_on:
      - order-db
      - rabbitmq
    networks:
      - secureshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  order-db:
    image: postgres:15-alpine
    container_name: order-db
    environment:
      - POSTGRES_DB=order_db
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - secureshop-network
    restart: unless-stopped

  # Payment Service (Node.js)
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - NODE_ENV=production
      - PAYMENT_API_KEY=${PAYMENT_API_KEY:-test-key-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-test-encryption-key}
    networks:
      - secureshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Notification Service (Python)
  notification-service:
    build:
      context: ./services/notifications-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8005:8005"
    environment:
      - PORT=8005
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - SMTP_SERVER=${SMTP_SERVER:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-your-email@gmail.com}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-your-app-password}
    depends_on:
      - rabbitmq
    networks:
      - secureshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Inventory Service (Node.js)
  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "8006:8006"
    environment:
      - PORT=8006
      - NODE_ENV=production
      - DB_HOST=inventory-db
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
    depends_on:
      - inventory-db
    networks:
      - secureshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  inventory-db:
    image: postgres:15-alpine
    container_name: inventory-db
    environment:
      - POSTGRES_DB=inventory_db
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    networks:
      - secureshop-network
    restart: unless-stopped

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - secureshop-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  secureshop-network:
    driver: bridge

volumes:
  user-db-data:
  product-db-data:
  order-db-data:
  inventory-db-data:
  rabbitmq-data:
